<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastroom | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔨</text></svg>">

</head>

<body data-page="cadastro" class="bg-zinc-900 text-zinc-100 min-h-screen font-sans">

    <nav class="bg-zinc-800 border-b border-zinc-700 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col xl:flex-row justify-between items-center gap-4">
            <h1
                class="text-xl md:text-2xl font-bold tracking-tighter text-orange-500 italic text-center w-full xl:w-auto">
                RASTROOM
                <!-- RASTROOM <span class="text-white">ROOM</span> -->
            </h1>
            <button id="btn-logout"
                class="p-2 md:px-4 rounded bg-red-500/20 text-red-500 border border-red-500/50 hover:bg-red-500/30 transition text-xs md:text-sm flex items-center justify-center col-span-2 sm:col-span-1">
                <i class="fas fa-sign-out-alt mr-2"></i>Sair
            </button>
        </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 pb-24">

        <section id="tab-admin" class="tab-content">
            <div class="bg-zinc-800 p-4 md:p-6 rounded-xl border border-zinc-700 shadow-xl">
                <div class="mb-6 border-b border-zinc-700 pb-4">
                    <h2 class="text-xl md:text-2xl font-bold flex items-center"><i
                            class="fas fa-edit mr-3 text-orange-500"></i>Cadastro de pedidos</h2>
                </div>

                <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                    <div class="space-y-4">
                        <h3
                            class="text-orange-500 font-bold uppercase text-xs tracking-widest border-b border-zinc-700 pb-2">
                            Dados do Pedido</h3>
                        <div>
                            <label class="block text-sm mb-1 opacity-70">Nome do Cliente</label>
                            <input type="text" id="cliente"
                                class="w-full bg-zinc-900 border border-zinc-600 p-3 rounded focus:border-orange-500 outline-none"
                                placeholder="Ex: Loft Design" required="">
                        </div>
                        <div>
                            <label class="block text-sm mb-1 opacity-70">Contato (WhatsApp)</label>
                            <input type="text" id="contato"
                                class="w-full bg-zinc-900 border border-zinc-600 p-3 rounded focus:border-orange-500 outline-none"
                                placeholder="(11) 99999-0000">
                        </div>
                        <div>
                            <label class="block text-sm mb-1 opacity-70">Catálogo de Produtos</label>
                            <select id="select-catalogo"
                                class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded text-sm text-zinc-300 focus:border-orange-500 outline-none">
                                <option value="Móvel Personalizado">📦 Móvel Personalizado</option>
                                <option value="Balcão de Pia 120cm">📦 Balcão de Pia 120cm</option>
                                <option value="Aéreo 2 Portas">📦 Aéreo 2 Portas</option>
                            </select>
                        </div>
                        <div id="campo-movel-nome">
                            <label class="block text-sm mb-1 opacity-70">Descrição do Móvel</label>
                            <input type="text" id="movel"
                                class="w-full bg-zinc-900 border border-zinc-600 p-3 rounded focus:border-orange-500 outline-none transition-all"
                                placeholder="Ex: Mesa de Jantar Oval" required="">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3
                            class="text-orange-500 font-bold uppercase text-xs tracking-widest border-b border-zinc-700 pb-2">
                            Peças do Conjunto</h3>
                        <div id="pecas-container" class="space-y-2 max-h-48 md:max-h-60 overflow-y-auto pr-2"></div>
                        <button type="button" id="add-peca"
                            class="w-full text-xs bg-zinc-700 hover:bg-zinc-600 px-3 py-3 md:py-2 rounded transition font-bold">
                            <i class="fas fa-plus mr-1"></i> Adicionar Peça
                        </button>

                        <div class="pt-4">
                            <label class="block text-sm mb-2 opacity-70">Cor/Acabamento</label>
                            <input type="color" id="cor"
                                class="w-full h-12 bg-zinc-900 border border-zinc-600 p-1 rounded cursor-pointer"
                                value="#d4a373">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3
                            class="text-orange-500 font-bold uppercase text-xs tracking-widest border-b border-zinc-700 pb-2">
                            Fluxo de Produção</h3>
                        <div class="space-y-3">
                            <label
                                class="flex items-center p-3 bg-zinc-900 rounded border border-zinc-700 hover:border-orange-500/50 cursor-pointer transition">
                                <input type="checkbox" name="processo" value="Lixamento" checked=""
                                    class="w-5 h-5 accent-orange-500 mr-3">
                                <div>
                                    <p class="text-sm font-bold">Lixamento</p>
                                    <p class="text-[10px] opacity-50">Preparação da superfície</p>
                                </div>
                            </label>
                            <label
                                class="flex items-center p-3 bg-zinc-900 rounded border border-zinc-700 hover:border-orange-500/50 cursor-pointer transition">
                                <input type="checkbox" name="processo" value="Pintura" checked=""
                                    class="w-5 h-5 accent-orange-500 mr-3">
                                <div>
                                    <p class="text-sm font-bold">Pintura/Lacca</p>
                                    <p class="text-[10px] opacity-50">Aplicação de cor e verniz</p>
                                </div>
                            </label>
                        </div>

                        <div class="pt-6 space-y-4">
                            <button type="submit"
                                class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-lg shadow-lg uppercase tracking-tighter transition-all transform hover:-translate-y-1 text-sm md:text-base">
                                <i class="fas fa-layer-group mr-2"></i> Gerar Lote
                            </button>
                            <label
                                class="flex items-center justify-center text-xs md:text-sm opacity-50 cursor-pointer p-2">
                                <input type="checkbox" id="retrabalho" class="mr-2 w-4 h-4 accent-red-500"> Marcar como
                                RETRABALHO
                            </label>
                        </div>
                    </div>
                </form>
            </div>
    </main>

    <div id="error-alert"
        class="fixed bottom-4 md:bottom-10 left-1/2 -translate-x-1/2 hidden bg-red-600 text-white p-4 md:p-6 rounded-2xl shadow-2xl z-[100] w-[90%] md:w-auto max-w-md flex items-center gap-4 border-2 md:border-4 border-white animate-bounce">
        <i class="fas fa-hand-paper text-3xl md:text-4xl"></i>
        <div>
            <h4 class="font-black text-lg md:text-xl italic uppercase">Atenção!</h4>
            <p id="error-msg" class="font-bold opacity-90 text-sm md:text-base"></p>
        </div>
    </div>

    <script type="module" src="../main.js"></script>
</body>

</html>
