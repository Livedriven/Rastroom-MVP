<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastroom | Login</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔨</text></svg>">
</head>

<body>
    <section class="min-h-screen flex items-center justify-center bg-zinc-950 p-4">
        <div class="w-full max-w-sm bg-zinc-800 rounded-lg shadow-xl p-8 border border-zinc-700">
            <h1 class="text-2xl font-bold text-center text-logo hover:text-logo-hover transition-colors duration-200 mb-8 bg-red">Rastroom</h1>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">
                        E-mail:
                        <input type="email" id="input-email" required placeholder="exemplo@gmail.com"
                            class="mt-1 block w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-100 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-colors" />
                    </label>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">
                        Senha
                        <input type="password" id="input-senha" placeholder="Informe senha" class="mt-1 block w-full bg-zinc-900 border border-zinc-700 rounded p-2 text-zinc-100
                            focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500
                            transition-colors" required/>
                    </label>
                </div>
                <div class="mt-6">
                    <button type="submit"
                    id="btn-submit"
                        class="w-full bg-logo hover:bg-logo-hover text-white duration-200 font-bold py-2 px-4 rounded transition-colors">
                        Entrar
                    </button>
                </div>
            </form>
        </div>
    </section>
    <script type="module" src="./js/login.js"></script>
</body>
</html>
